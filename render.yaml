version: "1"

services:
  - type: web
    name: flux-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flux-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flux-redis
          property: connectionString
      - key: POSTGRES_DB
        value: flux_db

  - type: worker
    name: flux-worker-io
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info -Q scrapers --concurrency=10
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flux-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flux-redis
          property: connectionString

  - type: worker
    name: flux-worker-cpu
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info -Q embeddings --concurrency=2
    plan: starter 
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flux-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flux-redis
          property: connectionString

  - type: web
    name: flux-frontend
    env: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL 
        fromService:
          type: web
          name: flux-api
          property: host

databases:
  - name: flux-db
    databaseName: flux_db
    user: user
    plan: starter 

  - name: flux-redis
    type: redis
    plan: free
